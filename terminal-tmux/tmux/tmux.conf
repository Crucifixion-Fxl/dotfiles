# =============================================================================
# tmux 主配置
#
# 由 terminal-tmux/bootstrap.sh 链接到 ~/.tmux.conf。所有机器共享此文件；
# 修改后可在 tmux 内执行 `tmux source-file ~/.tmux.conf` 立即重载。
# 本配置没有改默认 Prefix，因此仍为 Ctrl-b。
#
# tmux 常见作用域：
#   -g  全局选项，影响所有 session/window
#   -w  window 选项
#   -p  pane 选项
# =============================================================================

# --- 基础交互 ---------------------------------------------------------------
# 支持鼠标选择 pane/调整大小；保留较长滚动历史；复制时交给终端剪贴板。
set -g mouse on
set -g history-limit 100000
set -g set-clipboard external

# 窗口名默认允许自动更新，但禁止终端程序通过 escape sequence 乱改名称。
# shell/tmux-window-name.zsh 会负责设置更有意义的目录名或命令名。
set -g automatic-rename on
set -g allow-rename off

# Prefix+< / Prefix+>：调整当前 window 在底部状态栏中的左右顺序。
# `-d` 保持当前 window 仍被选中，只改变它所在的编号和显示位置。
bind-key < swap-window -d -t -1
bind-key > swap-window -d -t +1

# --- 终端能力与状态栏 -----------------------------------------------------
# 显式锁定显示默认值，避免 macOS/Ubuntu/tmux 版本差异导致渲染漂移。
set -g default-terminal tmux-256color
set -g status on
set -g status-style 'bg=green,fg=black'
set -g status-left '[#{session_name}] '
# 右侧显示最多 21 列的 pane title 和本地时间。最外层引号是显示内容的一部分。
set -g status-right '"#{=21:pane_title}" %H:%M %d-%b-%y'

# --- Shell 与弹窗 -----------------------------------------------------------
# 新 pane 统一通过受管的 login zsh 入口启动，但 SSH 的登录 shell 仍可以是 bash。
set -g default-command '$HOME/.local/bin/tmux-zsh'
# Prefix+t：在当前目录打开 90% 大小的临时 zsh 弹窗。
bind-key t display-popup -E -w 90% -h 90% -d "#{pane_current_path}" 'TMUX_POPUP=1 exec "$HOME/.local/bin/tmux-zsh"'

# --- lazygit -----------------------------------------------------------------
# 启动前仅信任当前 Git 仓库根目录，用于解决容器 bind mount 的 owner 不同问题。
# 不会设置危险的 `safe.directory=*`。
# Prefix+g：弹窗打开；Prefix+G：新 window 打开。
bind-key g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" 'exec "$HOME/.local/bin/lazygit-safe"'
bind-key G new-window -n lazygit -c "#{pane_current_path}" 'exec "$HOME/.local/bin/lazygit-safe"'

# --- Session 选择器 ----------------------------------------------------------
# Prefix+s：打开 session tree。session 行会调用辅助脚本，汇总其 window 的
# Codex 状态（运行/等待输入/完成）。`#{q:session_id}` 对 session id 做 shell 引用，
# 不能删除，否则 choose-tree 中的统计可能全部变成 0。
bind-key s choose-tree -Zs -F '#{?session_format,#{session_name} (#{session_windows} windows)  #($HOME/.tmux/session-status-counts.sh #{q:session_id}),#{?window_format,#{window_index}: #{window_name} (#{window_panes} panes),#{pane_index}: #{pane_title}}}'

# --- TPM 插件与 session 保存 ---------------------------------------------
# 插件的精确 commit 由 versions.lock 锁定，bootstrap 负责安装和校验。
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# continuum 每 15 分钟自动保存，但 tmux 启动时不自动恢复。
set -g @continuum-save-interval '15'
set -g @continuum-restore 'off'

# Prefix+S 手动保存，Prefix+R 手动恢复；不保存 pane 的历史文本。
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-capture-pane-contents 'off'

# TPM 必须最后加载，确保上面的插件和选项已定义。
run '~/.tmux/plugins/tpm/tpm'
