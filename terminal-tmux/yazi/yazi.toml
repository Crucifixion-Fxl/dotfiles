# Yazi 使用 Vim 打开文本文件，并仅为该 opener 启用全鼠标模式。
# autoread 允许未修改的缓冲区重新读取外部变更；定时器每秒执行一次
# checktime，让已打开的文件持续反映磁盘上的最新内容。
[opener]
edit = [
	{ run = '''vim -c 'set mouse=a autoread' -c 'call timer_start(1000, {-> execute("checktime")}, {"repeat": -1})' %s''', block = true, desc = "Vim with auto-reload", for = "unix" },
]
