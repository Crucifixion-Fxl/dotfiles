set -g mouse on
set -g history-limit 100000
set -g set-clipboard external
set -g automatic-rename on
set -g allow-rename off

# Make display defaults explicit so they do not drift across hosts.
set -g default-terminal tmux-256color
set -g status on
set -g status-style 'bg=green,fg=black'
set -g status-left '[#{session_name}] '
set -g status-right '"#{=21:pane_title}" %H:%M %d-%b-%y'

# tmux panes always use the managed zsh entrypoint. The remote login shell may
# still be bash or zsh.
set -g default-command '$HOME/.local/bin/tmux-zsh'
bind-key t display-popup -E -w 90% -h 90% -d "#{pane_current_path}" 'TMUX_POPUP=1 exec "$HOME/.local/bin/tmux-zsh"'

# lazygit is a strict dependency installed by bootstrap.sh.
bind-key g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind-key G new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# Summarize Codex states for all windows in the session chooser.
bind-key s choose-tree -Zs -F '#{?session_format,#{session_name} (#{session_windows} windows)  #($HOME/.tmux/session-status-counts.sh #{q:session_id}),#{?window_format,#{window_index}: #{window_name} (#{window_panes} panes),#{pane_index}: #{pane_title}}}'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'off'

set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-capture-pane-contents 'off'

run '~/.tmux/plugins/tpm/tpm'
